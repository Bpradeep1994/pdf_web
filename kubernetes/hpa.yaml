apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: gateway-hpa, namespace: pdf-editor }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: gateway }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: pdf-service-hpa, namespace: pdf-editor }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: pdf-service }
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: ocr-service-hpa, namespace: pdf-editor }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ocr-service }
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
