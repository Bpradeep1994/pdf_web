{{- /*
This Secret is intentionally NOT populated from values (no plaintext secrets in the
chart). Provide it out-of-band, e.g.:

  kubectl create secret generic <release>-secrets \
    --from-literal=SECRET_KEY=$(openssl rand -base64 48) \
    --from-literal=DATABASE_URL=postgresql+asyncpg://... \
    --from-literal=REDIS_URL=redis://... \
    ... (see values.yaml secretKeys)

or use the External Secrets Operator / SealedSecrets. This template only creates an
EMPTY placeholder when .Values.createEmptySecret=true so first install doesn't fail. */}}
{{- if .Values.createEmptySecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pdf-editor.secretName" . }}
  labels: {{- include "pdf-editor.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range .Values.secretKeys }}
  {{ . }}: ""
  {{- end }}
{{- end }}
