name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to deploy
        required: true
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}    # ghcr.io/<owner>/<repo>/<service>

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { service: gateway,            context: ./backend,  dockerfile: backend/gateway/Dockerfile }
          - { service: auth_service,        context: ./backend,  dockerfile: backend/auth_service/Dockerfile }
          - { service: pdf_service,         context: ./backend,  dockerfile: backend/pdf_service/Dockerfile }
          - { service: ocr_service,         context: ./backend,  dockerfile: backend/ocr_service/Dockerfile }
          - { service: conversion_service,  context: ./backend,  dockerfile: backend/conversion_service/Dockerfile }
          - { service: frontend,            context: ./frontend, dockerfile: frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Update kubeconfig (EKS)
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
      - uses: azure/setup-helm@v4
      - name: Helm deploy
        run: |
          helm upgrade --install pdf-editor deploy/helm/pdf-editor \
            --namespace pdf-editor --create-namespace \
            --set image.registry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --set image.tag=${{ github.event.inputs.tag || github.ref_name }} \
            --wait --timeout 10m
