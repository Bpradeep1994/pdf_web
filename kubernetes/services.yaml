apiVersion: v1
kind: Service
metadata: { name: frontend,           namespace: pdf-editor }
spec: { selector: { app: frontend },           ports: [{ port: 3000, targetPort: 3000 }] }
---
apiVersion: v1
kind: Service
metadata: { name: gateway,            namespace: pdf-editor }
spec: { selector: { app: gateway },            ports: [{ port: 8000, targetPort: 8000 }] }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service,       namespace: pdf-editor }
spec: { selector: { app: auth-service },       ports: [{ port: 8001, targetPort: 8001 }] }
---
apiVersion: v1
kind: Service
metadata: { name: pdf-service,        namespace: pdf-editor }
spec: { selector: { app: pdf-service },        ports: [{ port: 8002, targetPort: 8002 }] }
---
apiVersion: v1
kind: Service
metadata: { name: ocr-service,        namespace: pdf-editor }
spec: { selector: { app: ocr-service },        ports: [{ port: 8004, targetPort: 8004 }] }
---
apiVersion: v1
kind: Service
metadata: { name: conversion-service, namespace: pdf-editor }
spec: { selector: { app: conversion-service }, ports: [{ port: 8005, targetPort: 8005 }] }
---
apiVersion: v1
kind: Service
metadata: { name: postgres,  namespace: pdf-editor }
spec: { selector: { app: postgres },  ports: [{ port: 5432, targetPort: 5432 }] }
---
apiVersion: v1
kind: Service
metadata: { name: redis,     namespace: pdf-editor }
spec: { selector: { app: redis },     ports: [{ port: 6379, targetPort: 6379 }] }
---
apiVersion: v1
kind: Service
metadata: { name: rabbitmq,  namespace: pdf-editor }
spec: { selector: { app: rabbitmq },  ports: [{ port: 5672, targetPort: 5672 }, { port: 15672, targetPort: 15672 }] }
