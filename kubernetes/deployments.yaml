# ──────────────────────────────────────────────────────────────────────────────
# Frontend
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pdf-editor
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: your-registry/pdf-editor-frontend:latest
          ports: [{ containerPort: 3000 }]
          env:
            - { name: NEXT_PUBLIC_API_URL, value: "https://api.yourdomain.com" }
            - { name: NEXT_PUBLIC_WS_URL,  value: "wss://api.yourdomain.com" }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
# ──────────────────────────────────────────────────────────────────────────────
# API Gateway
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: pdf-editor
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: your-registry/pdf-editor-gateway:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef:  { name: pdf-editor-config }
            - secretRef:     { name: pdf-editor-secrets }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:              # restarts a hung/crashed pod (readiness only de-registers it)
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
---
# ──────────────────────────────────────────────────────────────────────────────
# Auth Service
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pdf-editor
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: your-registry/pdf-editor-auth:latest
          ports: [{ containerPort: 8001 }]
          envFrom:
            - configMapRef: { name: pdf-editor-config }
            - secretRef:    { name: pdf-editor-secrets }
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 25
            periodSeconds: 20
            failureThreshold: 3
---
# ──────────────────────────────────────────────────────────────────────────────
# PDF Service
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-service
  namespace: pdf-editor
spec:
  replicas: 2
  selector:
    matchLabels: { app: pdf-service }
  template:
    metadata:
      labels: { app: pdf-service }
    spec:
      containers:
        - name: pdf-service
          image: your-registry/pdf-editor-pdf:latest
          ports: [{ containerPort: 8002 }]
          envFrom:
            - configMapRef: { name: pdf-editor-config }
            - secretRef:    { name: pdf-editor-secrets }
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits:   { cpu: 2000m, memory: 2Gi }
          readinessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 25
            periodSeconds: 20
            failureThreshold: 3
---
# ──────────────────────────────────────────────────────────────────────────────
# OCR Service
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-service
  namespace: pdf-editor
spec:
  replicas: 2
  selector:
    matchLabels: { app: ocr-service }
  template:
    metadata:
      labels: { app: ocr-service }
    spec:
      containers:
        - name: ocr-service
          image: your-registry/pdf-editor-ocr:latest
          ports: [{ containerPort: 8004 }]
          envFrom:
            - configMapRef: { name: pdf-editor-config }
            - secretRef:    { name: pdf-editor-secrets }
          resources:
            requests: { cpu: 1000m, memory: 2Gi }
            limits:   { cpu: 4000m, memory: 8Gi }
          readinessProbe:
            httpGet: { path: /health, port: 8004 }
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 8004 }
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
---
# ──────────────────────────────────────────────────────────────────────────────
# Conversion Service
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversion-service
  namespace: pdf-editor
spec:
  replicas: 2
  selector:
    matchLabels: { app: conversion-service }
  template:
    metadata:
      labels: { app: conversion-service }
    spec:
      containers:
        - name: conversion-service
          image: your-registry/pdf-editor-conversion:latest
          ports: [{ containerPort: 8005 }]
          envFrom:
            - configMapRef: { name: pdf-editor-config }
            - secretRef:    { name: pdf-editor-secrets }
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: 2000m, memory: 4Gi }
          readinessProbe:
            httpGet: { path: /health, port: 8005 }
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 8005 }
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
