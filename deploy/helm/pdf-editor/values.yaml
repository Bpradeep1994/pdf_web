# ── Global image settings ─────────────────────────────────────────────────────
image:
  registry: ghcr.io/your-org/pdf-editor   # <repo>/<service>:<tag>
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""

# ── Non-secret config (rendered into a ConfigMap, injected as env) ─────────────
# Connection strings for managed AWS services live in the Secret (see secret.yaml /
# --set-string or an external-secrets operator), NOT here.
config:
  ENVIRONMENT: production
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  S3_BUCKET: pdf-documents
  S3_ENDPOINT: ""                       # empty → real AWS S3
  S3_PUBLIC_ENDPOINT: ""                # empty → real AWS S3 (presigned URLs)
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  ALLOWED_ORIGINS: "https://app.example.com"

# Keys expected in the Secret named `<release>-secrets` (create out-of-band or via
# external-secrets / SealedSecrets). Listed here for documentation + envFrom.
secretKeys:
  - SECRET_KEY
  - DATABASE_URL          # postgresql+asyncpg://user:pass@<rds-endpoint>:5432/pdfeditor
  - REDIS_URL             # redis://:pass@<elasticache-endpoint>:6379/0
  - RABBITMQ_URL          # amqp://user:pass@<amazon-mq-endpoint>:5672/
  - S3_ACCESS_KEY
  - S3_SECRET_KEY
  - STRIPE_SECRET_KEY
  - STRIPE_WEBHOOK_SECRET
  - GOOGLE_CLIENT_ID
  - GOOGLE_CLIENT_SECRET
  - GITHUB_CLIENT_ID
  - GITHUB_CLIENT_SECRET

# ── Services ──────────────────────────────────────────────────────────────────
# Each becomes a Deployment + Service. The gateway is the only ingress entrypoint.
services:
  gateway:
    port: 8000
    replicas: 3
    public: true
    resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 256Mi } }
    autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 20, targetCPU: 70 }
  auth_service:
    port: 8001
    replicas: 2
    resources: { requests: { cpu: 100m, memory: 192Mi }, limits: { cpu: 500m, memory: 384Mi } }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 10, targetCPU: 70 }
  pdf_service:
    port: 8002
    replicas: 3
    resources: { requests: { cpu: 250m, memory: 512Mi }, limits: { cpu: "1", memory: 1Gi } }
    autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 30, targetCPU: 65 }
  ocr_service:
    port: 8004
    replicas: 2
    resources: { requests: { cpu: 500m, memory: 1Gi }, limits: { cpu: "2", memory: 2Gi } }
    autoscaling: { enabled: true, minReplicas: 1, maxReplicas: 15, targetCPU: 75 }
  conversion_service:
    port: 8005
    replicas: 2
    resources: { requests: { cpu: 500m, memory: 1Gi }, limits: { cpu: "2", memory: 2Gi } }
    autoscaling: { enabled: true, minReplicas: 1, maxReplicas: 15, targetCPU: 75 }
  frontend:
    port: 3000
    replicas: 2
    resources: { requests: { cpu: 100m, memory: 192Mi }, limits: { cpu: 500m, memory: 384Mi } }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 10, targetCPU: 70 }

# ── Database migrations (alembic) run as a pre-install/upgrade Job ──────────────
migrations:
  enabled: true
  image: ""              # defaults to the pdf_service image (has DB deps)
  command: ["alembic", "upgrade", "head"]

# ── Ingress (AWS ALB by default) ───────────────────────────────────────────────
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  apiHost: api.example.com
  appHost: app.example.com
