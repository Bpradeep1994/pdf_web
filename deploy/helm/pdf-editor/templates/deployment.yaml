{{- $root := . -}}
{{- range $svc, $cfg := .Values.services }}
{{- $name := printf "%s-%s" $root.Release.Name ($svc | replace "_" "-") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "pdf-editor.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $svc }}
spec:
  replicas: {{ $cfg.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $svc }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: {{ $svc }}
    spec:
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $svc }}
          image: "{{ $root.Values.image.registry }}/{{ $svc }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $cfg.port }}
          envFrom:
            - configMapRef:
                name: {{ include "pdf-editor.configName" $root }}
            - secretRef:
                name: {{ include "pdf-editor.secretName" $root }}
          {{- if ne $svc "frontend" }}
          readinessProbe:
            httpGet: { path: /health, port: {{ $cfg.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: {{ $cfg.port }} }
            initialDelaySeconds: 20
            periodSeconds: 20
          {{- else }}
          readinessProbe:
            httpGet: { path: /, port: {{ $cfg.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- end }}
          resources: {{- toYaml $cfg.resources | nindent 12 }}
{{- end }}
