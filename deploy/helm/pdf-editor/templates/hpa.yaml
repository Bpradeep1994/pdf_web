{{- $root := . -}}
{{- range $svc, $cfg := .Values.services }}
{{- if and $cfg.autoscaling $cfg.autoscaling.enabled }}
{{- $name := printf "%s-%s" $root.Release.Name ($svc | replace "_" "-") }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  labels: {{- include "pdf-editor.labels" $root | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $cfg.autoscaling.minReplicas }}
  maxReplicas: {{ $cfg.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetCPU }}
{{- end }}
{{- end }}
